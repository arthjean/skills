[dist]
cargo-dist-version = "0.32.0"
# release.yml adds native smoke and provenance gates that generated CI cannot express.
allow-dirty = ["ci"]
ci = ["github"]
pr-run-mode = "plan"
installers = ["shell"]
include = ["LICENSE", "README.md", "THIRD_PARTY.md"]
targets = [
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
checksum = "sha256"
fail-fast = true
install-updater = false
github-attestations = true
github-attestations-filters = ["*.json", "*.sh", "*.tar.xz", "*.sha256", "*.sum"]
github-build-setup = ".github/build-setup.yml"

[dist.github-custom-runners]
x86_64-unknown-linux-musl = "ubuntu-24.04"
aarch64-unknown-linux-musl = "ubuntu-24.04-arm"
x86_64-apple-darwin = "macos-15-intel"
aarch64-apple-darwin = "macos-15"
